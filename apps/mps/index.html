<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="about" content="โปรแกรมตัวนี้ถูกออกแบบและสร้างโดย ชรินทร์ นวฤทธิ์โลหะ เครื่องมือที่ใช้สร้าง code ที่เป็นโครงร่างโปรแกรม Google Gemini 2026 (free version)">
    <meta name="copyright" content="Copyright © 2026 Charin Nawaritloha. All rights reserved">

    <style>
        * {
            font-family: "Thonburi", "Sukhumvit Set", "Tahoma", -apple-system, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-x pan-y;
            font-size: 16px;
        }

        .screen {
            display: none;
            width: 100%;
            /*height: 177.78vw;*/
            /*max-width: 450px;*/
            /*max-height: 800px;*/
            /*border: 2px solid black;*/
            /*box-sizing: border-box;*/
            padding: 10px;
            text-align: center;
            position: relative;
            flex-direction: column;
            align-items: center;
        }

        .active {
            display: flex;
        }

        button {
            margin: 5px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 10px;
            /*width: 80%;*/
        }

        .keypad button {
            height: 75px;
            min-width: 75px;
            background-color: rgba(224, 224, 224, 0.75);
            border: 1px solid gray;
        }

        .display-box {
            border: 2px solid red;
            background-color: yellow;
            padding: 10px;
            margin: 10px;
            font-weight: bold;
            width: 80%;
        }

        .score-box {
            border: 2px solid green;
            background-color: yellow;
            padding: 20px;
            font-size: 30px;
            margin: 10px;
        }

        .pin-container {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .pin-box {
            width: 50px;
            height: 50px;
            border: 1px solid gray;
            display: flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            background-color: white;
        }

        .phone-box {
            font-size: 1.7em;
            width: 1em;
            height: 1em;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scaleY(2);
            transform-origin: bottom;
            background-color: white;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 12px;
            background-color: rgba(255, 255, 255, 0.8);
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 5px;
        }

        textarea {
            width: 90%;
            height: 200px;
            margin-top: 10px;
        }

        input {
            margin: 5px;
            padding: 5px;
            font-size: 16px;
            width: 80%;
        }

        .adminButton {
            width: 70%;
            height: 50px;
        }

        input[type="tel"] {
            font-size: 1.5rem;
            width: 11em;
            text-align: center;
        }

        h2,
        p {
            padding: 0;
            margin: 0;
        }

        input[type=button],
        button {
            border-radius: 8px;
            background-color: rgba(224, 224, 224, 0.75);
            border: 1px solid gray;
        }
    </style>
</head>

<body style="background: url('bg.png') no-repeat center center; background-size: contain;">
    <div id="screen4" class="screen active">
        <h2>Admin</h2>
        <p>ระบุรหัสผ่าน</p>
        <div class="pin-container" id="pinDisplay">
            <div class="pin-box"></div>
            <div class="pin-box"></div>
            <div class="pin-box"></div>
            <div class="pin-box"></div>
        </div>
        <div class="keypad">
            <button onclick="inputPin('1')">1</button><button onclick="inputPin('2')">2</button><button onclick="inputPin('3')">3</button>
            <button onclick="inputPin('4')">4</button><button onclick="inputPin('5')">5</button><button onclick="inputPin('6')">6</button>
            <button onclick="inputPin('7')">7</button><button onclick="inputPin('8')">8</button><button onclick="inputPin('9')">9</button>
            <button onclick="inputPin('0')">0</button><button style="grid-column: span 2" onclick="delPin()">⌫</button>
        </div>
    </div>

    <div id="screen5" class="screen">
        <h2>Admin Menu</h2>
        <button class="adminButton" onclick="goToScreen(1)">สะสมแต้ม</button>
        <button class="adminButton" onclick="showRecent()">ดูรายการล่าสุด</button>
        <div style="height: 25px;"></div>
        <button class="adminButton" onclick="goToScreen(6)">ตรวจสอบแต้ม</button>
        <button class="adminButton" onclick="goToScreen(7)">แก้ไขแต้ม</button>
        <div style="height: 25px;"></div>
        <button class="adminButton" onclick="backupData()">สำรองข้อมูล</button>
        <button class="adminButton" onclick="goToScreen(8)">กู้คืนข้อมูลสำรอง</button>
    </div>

    <div id="screen1" class="screen">
        <h2>สะสมแต้มสมาชิก</h2>
        <div style="height: 1em;"></div>
        <button onclick="setPoint(1)" style="color:blueviolet; font-size: 2rem;">แต้ม x1</button>
        <button onclick="setPoint(2)" style="color:brown; font-size: 2rem;">แต้ม x2</button>
        <div style="height: 25px;"></div>
        <input type="tel" id="customPoint" maxlength="2" style="width:4em; text-align: center;" placeholder="แต้ม"><button onclick="setPointCustom()">สะสมแต้ม</button>
        <div style="height: 50px;"></div>
        <button onclick="goToScreen(4)">Admin</button>
    </div>

    <div id="screen2" class="screen">
        <h2>สะสมแต้มสมาชิก</h2>
        <div id="pointDisplayS2" class="display-box">แต้ม x?</div>
        <p>ระบุเบอร์โทรศัพท์</p>
        <div class="pin-container" id="phoneDisplay" style="padding-top: 20px;">
            <div class="phone-box"></div>
            <div class="phone-box"></div>
            <div class="phone-box"></div>
            <div class="phone-box" style="color: #ccc;"></div>
            <div class="phone-box" style="color: #ccc;"></div>
            <div class="phone-box" style="color: #ccc;"></div>
            <div class="phone-box" style="color: #ccc;"></div>
            <div class="phone-box"></div>
            <div class="phone-box"></div>
            <div class="phone-box"></div>
        </div>
        <div class="keypad">
            <button onclick="inputPhone('1')">1</button><button onclick="inputPhone('2')">2</button><button onclick="inputPhone('3')">3</button>
            <button onclick="inputPhone('4')">4</button><button onclick="inputPhone('5')">5</button><button onclick="inputPhone('6')">6</button>
            <button onclick="inputPhone('7')">7</button><button onclick="inputPhone('8')">8</button><button onclick="inputPhone('9')">9</button>
            <button onclick="goToScreen(4, true)" style="font-size: 10px; color: darkgray;">Admin</button><button onclick="inputPhone('0')">0</button><button onclick="delPhone()" style="color: darkred;">⌫</button>
        </div>
    </div>

    <div id="screen3" class="screen">
        <h2>สะสมแต้มสมาชิก</h2>
        <div class="display-box">แต้ม x<span id="lastAddedPoint"></span></div>
        <p>บันทึกแต้มเรียบร้อยแล้ว</p>
        <div id="phoneResult" class="display-box" style="background-color: #c5ffc5; border-color: green; font-size: 30px; letter-spacing: 2px;">-</div>
        <p>คุณมีแต้มคงเหลือ</p>
        <div id="totalPointsS3" class="score-box" style="padding: 1em 1.5em;">0</div>
        <div style="display:flex;">
            <button onclick="confirmEdit()">แก้ไข</button>
            <button onclick="goToScreen(4)">Admin</button>
        </div>
    </div>

    <div id="screen6" class="screen" style="overflow-y: auto;">
        <h2>Admin - ตรวจสอบแต้ม</h2>
        <div>
            <input type="tel" id="searchPhone" maxlength="10" placeholder="เบอร์โทรศัพท์">
            <button onclick="searchMember()">ค้นหา</button>
        </div>
        <p>แต้มคงเหลือ <span id="memberTotalPoint" class="display-box" style="display:inline-block; width:auto;">0</span></p>
        <p>เวลาปัจจุบัน: <span id="currentDateTime" style="font-weight: bold;"></span></p>
        <div style="max-height: 200px; overflow-y: auto; width: 100%;">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>วันที่</th>
                        <th>ประเภท</th>
                        <th>คะแนน</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div style="margin-top:20px;">
            <button onclick="goToScreen(5)">Admin</button>
            <button onclick="exchangeReward()">แลกของรางวัล</button>
        </div>
    </div>

    <div id="screen7" class="screen">
        <h2>Admin - แก้ไขแต้ม</h2>
        <input type="tel" id="editPhone" maxlength="10" placeholder="เบอร์โทรศัพท์">
        <input type="number" id="editPointValue" placeholder="จำนวนแต้ม (เช่น 1 หรือ -1)">
        <button onclick="saveEditPoint()">บันทึกการแก้ไข</button>
        <button onclick="goToScreen(5)">Admin</button>
    </div>

    <div id="screen8" class="screen">
        <h2>Admin - กู้คืนข้อมูล</h2>
        <textarea id="restoreArea" placeholder="วางข้อมูล JSON ที่นี่"></textarea>
        <button onclick="resetJson()">ล้างข้อมูล</button>
        <button onclick="restoreData()">กู้คืนข้อมูล</button>
        <button onclick="goToScreen(5)">Admin</button>
    </div>



    <script>
        // --- Database Setup ---
        const db = new Dexie("MemberDB");
        db.version(1).stores({
            transactions: '++id, phone, dt, type, score'
        });

        // --- Config & State ---
        const ADMIN_PIN = "1375";
        let currentPointsToSave = 0;
        let currentPin = "";
        let currentPhone = "";
        let lastRecordId = null;

        // --- Core Functions ---
        async function goToScreen(screenNum, confirmBack = false) {
            if (confirmBack && !confirm("ต้องการยกเลิกใช่หรือไม่?")) return;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + screenNum).classList.add('active');
            if (screenNum === 1) { document.getElementById("customPoint").value = ""; }
            if (screenNum === 4) { currentPin = ""; updatePinDisplay(); }
            if (screenNum === 2) { currentPhone = ""; updatePhoneDisplay(); }
            if (screenNum === 6) { clearSearchMember(); }
        }

        function getTimestamp() {
            const now = new Date();
            return now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0') + " " +
                String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
        }

        // --- DB Logic (Async) ---
        async function addRecord(phone, score, type) {
            const id = await db.transactions.add({
                phone: phone,
                dt: getTimestamp(),
                type: type,
                score: parseInt(score)
            });
            lastRecordId = id;
            return await getSumPoints(phone);
        }

        async function getSumPoints(phone) {
            const records = await db.transactions.where('phone').equals(phone).toArray();
            return records.reduce((sum, item) => sum + item.score, 0);
        }

        // --- Screen Handlers ---
        function inputPin(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updatePinDisplay();
                if (currentPin.length === 4) {
                    if (currentPin === ADMIN_PIN) goToScreen(5);
                    else { alert("รหัสผิด ให้ใส่ใหม่"); currentPin = ""; updatePinDisplay(); }
                }
            }
        }

        function delPin() { currentPin = currentPin.slice(0, -1); updatePinDisplay(); }

        function updatePinDisplay() {
            const boxes = document.querySelectorAll('#pinDisplay .pin-box');
            boxes.forEach((box, i) => box.innerText = currentPin[i] ? "*" : "");
        }

        async function showRecent() {
            if (!lastRecordId) { alert("ยังไม่มีรายการล่าสุด"); return; }
            const rec = await db.transactions.get(lastRecordId);
            if (rec) alert(`เบอร์โทรศัพท์: ${rec.phone}\nวันที่และเวลา: ${rec.dt}\nคะแนน: ${rec.score}`);
        }

        async function backupData() {
            const allData = await db.transactions.toArray();
            const blob = new Blob([JSON.stringify(allData)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${new Date().getTime()}.json`;
            a.click();
        }

        function setPoint(p) {
            currentPointsToSave = p;
            document.getElementById('pointDisplayS2').innerText = "แต้ม x" + p;
            goToScreen(2);
        }

        /// สำหรับกรอกแต้มด้วยมือ
        function setPointCustom() {
            const point = parseInt(document.getElementById("customPoint").value);

            if (isNaN(point) || (point < 1)) {
                alert('จำนวนแต้มผิดพลาด ระบุเลข 1 ถึง 99 เท่านั้น');
                return;
            }

            setPoint(point);
        }


        async function inputPhone(num) {
            if (currentPhone.length < 10) {
                currentPhone += num;
                updatePhoneDisplay();
                if (currentPhone.length === 10) {
                    const total = await addRecord(currentPhone, currentPointsToSave, 'score');
                    document.getElementById('lastAddedPoint').innerText = currentPointsToSave;
                    document.getElementById('phoneResult').innerHTML = currentPhone.substring(0, 3) + "XXXX" + currentPhone.substring(7);
                    document.getElementById('totalPointsS3').innerText = total;
                    goToScreen(3);
                }
            }
        }

        function delPhone() { currentPhone = currentPhone.slice(0, -1); updatePhoneDisplay(); }


        function updatePhoneDisplay() {
            const boxes = document.querySelectorAll('#phoneDisplay .phone-box');
            boxes.forEach((box, i) => box.innerText = currentPhone[i] || "");
        }

        async function confirmEdit() {
            if (confirm("ยืนยันว่าจะกลับไปแก้ไขข้อมูลหรือไม่?")) {
                if (lastRecordId) {
                    await db.transactions.delete(lastRecordId);
                    lastRecordId = null;
                }
                goToScreen(2);
            }
        }

        async function searchMember() {
            const phone = document.getElementById('searchPhone').value;
            if (!phone) return;
            const total = await getSumPoints(phone);
            document.getElementById('memberTotalPoint').innerText = total;

            const history = await db.transactions.where('phone').equals(phone).reverse().toArray();
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = history.map(h => `<tr><td>${h.dt}</td><td>${h.type}</td><td>${h.score}</td></tr>`).join('');
            if (history.length == 0) {
                alert("ไม่พบข้อมูลตรงกับเบอร์ที่ระบุ");
            }
        }


        function clearSearchMember() {
            document.getElementById('searchPhone').value = "";
            document.getElementById('memberTotalPoint').innerText = "?";
            document.getElementById('currentDateTime').innerText = getTimestamp();
            document.querySelector('#historyTable tbody').innerHTML = "<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>";
        }



        async function exchangeReward() {
            const phone = document.getElementById('searchPhone').value;
            if (!phone) return;
            const amountStr = prompt("ระบุจำนวนคะแนนที่ต้องการแลก", "10");
            if (amountStr === null) return;
            const amount = parseInt(amountStr);
            const total = await getSumPoints(phone);

            if (total < amount) alert("แต้มไม่พอ");
            else if (confirm(`ยืนยันการหักแต้มจำนวน ${amount}?`)) {
                await addRecord(phone, -amount, 'exchange');
                alert("หักแต้มเรียบร้อยแล้ว");
                searchMember();
            }
        }

        async function saveEditPoint() {
            const phone = document.getElementById('editPhone').value;
            const points = document.getElementById('editPointValue').value;
            if (!phone || !points) return;
            const total = await addRecord(phone, points, 'adjust');
            alert(`บันทึกเรียบร้อยแล้ว\nผลคะแนนหลังแก้ไข: ${total}`);
            goToScreen(5);
        }

        async function restoreData() {
            const jsonText = document.getElementById('restoreArea').value;
            try {
                const dataArray = JSON.parse(jsonText);
                const confirmText = prompt("ให้พิมพ์คำว่า Yes เพื่อยืนยันการแทนที่ข้อมูล\nการกู้ข้อมูลจะทำลายข้อมูลเดิมทั้งหมดทิ้ง ไม่สามารถยกเลิกกระการได้");
                if (confirmText === "Yes") {
                    await db.transactions.clear();
                    // ลบ Field 'id' เดิมออกเพื่อให้ Dexie สร้างใหม่แบบ auto-increment
                    const cleanData = dataArray.map(({ id, ...rest }) => rest);
                    await db.transactions.bulkAdd(cleanData);
                    alert(`สำเร็จ นำเข้าทั้งหมด ${cleanData.length} records`);
                    goToScreen(5);
                } else {
                    alert("คำยืนยันไม่ถูกต้อง");
                }
            } catch (e) {
                alert("รูปแบบ JSON ไม่ถูกต้อง");
            }
        }

        /// ล้างข้อมูลใน text area ที่ใช้กู้ข้อมูลทิ้ง
        function resetJson() {
            document.getElementById("restoreArea").value = "";
        }
    </script>
    <script>
        // Service Worker for offline cache 
        // https://dev.to/naimur/building-offline-ready-webpage-with-service-worker-and-cache-storage-3dbk
        async function registerServiceWorker() {
            if ("serviceWorker" in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register(
                        "sw.js"
                    );
                    console.log(
                        "Service Worker registered with scope:",
                        registration.scope
                    );
                } catch (error) {
                    console.error("Service Worker registration failed:", error);
                }
            }
        }

        registerServiceWorker();
    </script>
</body>

</html>
